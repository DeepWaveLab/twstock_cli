name: Update Homebrew Formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for PyPI availability
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/twstock-cli/$VERSION/json" > /dev/null; then
              echo "PyPI package $VERSION is available"
              exit 0
            fi
            echo "Waiting for PyPI... attempt $i/30"
            sleep 10
          done
          echo "::error::Timed out waiting for PyPI package"
          exit 1

      - name: Generate formula
        run: |
          pip install homebrew-pypi-poet "twstock-cli==$VERSION"
          python3 - "$VERSION" <<'PYSCRIPT'
          import json, re, subprocess, sys, urllib.request

          version = sys.argv[1]
          url = f"https://pypi.org/pypi/twstock-cli/{version}/json"
          with urllib.request.urlopen(url) as resp:
              data = json.load(resp)

          sdist = next(f for f in data["urls"] if f["packagetype"] == "sdist")
          sdist_url = sdist["url"]
          sdist_sha = sdist["digests"]["sha256"]

          poet_output = subprocess.check_output(["poet", "twstock-cli"], text=True)

          # Remove the twstock-cli resource block itself
          blocks = re.split(r'\n(?=  resource )', poet_output)
          resources = "\n".join(b for b in blocks if 'resource "twstock-cli"' not in b).strip()

          formula = f'''class TwstockCli < Formula
            include Language::Python::Virtualenv

            desc "Agent-friendly CLI for Taiwan Stock Exchange (TWSE) and Taipei Exchange (TPEX)"
            homepage "https://github.com/DeepWaveLab/twstock_cli"
            url "{sdist_url}"
            sha256 "{sdist_sha}"
            license "MIT"

            depends_on "python@3.12"

          {resources}

            def install
              virtualenv_install_with_resources
            end

            test do
              assert_match "Usage", shell_output("#{{bin}}/twstock --help")
            end
          end
          '''

          with open("formula.rb", "w") as f:
              f.write(formula)
          print(formula)
          PYSCRIPT

      - name: Push to tap repo
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/DeepWaveLab/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/twstock-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/twstock-cli.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update twstock-cli to $VERSION"
          git push
