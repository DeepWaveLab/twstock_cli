name: CI / Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev
      - run: uv run pytest -m "not integration and not smoke" -v --tb=long

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check twstock_cli/ tests/
      - run: uv run ruff format --check twstock_cli/ tests/

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install 3.13
      - run: uv build
      - run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Wait for PyPI availability
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf "https://pypi.org/pypi/twstock-cli/$VERSION/json" > /dev/null; then
              echo "PyPI package $VERSION is available"
              exit 0
            fi
            echo "Waiting for PyPI... attempt $i/30"
            sleep 10
          done
          echo "::error::Timed out waiting for PyPI package"
          exit 1

      - name: Update Homebrew Formula
        run: |
          python3 - "$VERSION" <<'PYSCRIPT'
          import json, sys, urllib.request, re

          version = sys.argv[1]
          with urllib.request.urlopen(f"https://pypi.org/pypi/twstock-cli/{version}/json") as resp:
              data = json.load(resp)

          sdist = next(f for f in data["urls"] if f["packagetype"] == "sdist")

          formula = f'''class TwstockCli < Formula
            include Language::Python::Virtualenv

            desc "Agent-friendly CLI for Taiwan Stock Exchange (TWSE) and Taipei Exchange (TPEX)"
            homepage "https://github.com/DeepWaveLab/twstock_cli"
            url "{sdist["url"]}"
            sha256 "{sdist["digests"]["sha256"]}"
            license "MIT"

            depends_on "python@3.12"

            def install
              virtualenv_install_with_resources
            end

            test do
              assert_match "Usage", shell_output("#{{bin}}/twstock --help")
            end
          end
          '''

          with open("Formula/twstock-cli.rb", "w") as f:
              f.write(formula)
          print(formula)
          PYSCRIPT

      - name: Commit updated Formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/twstock-cli.rb
          git diff --cached --quiet && echo "No formula changes" && exit 0
          git commit -m "chore: update Homebrew Formula to v$VERSION"
          git push origin HEAD:main
